<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenneth Moncur's Almanac</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #00cfff 0%, #ffe156 100%);
      color: #222;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    header {
      margin-top: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #007c6c;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.2rem;
      color: #ff7f11;
      margin-bottom: 2rem;
    }
    nav {
      margin: 2rem 0;
    }
    nav a {
      background: #007c6c;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      margin: 0 0.5rem;
      font-weight: bold;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    nav a:hover {
      background: #ff7f11;
      color: #fff;
    }
    .hero-img {
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      margin: 2rem 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .footer {
      margin-top: auto;
      padding: 1rem;
      color: #007c6c;
      font-size: 1rem;
      text-align: center;
    }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      nav a { padding: 0.5rem 1rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏝️ Kenneth Moncur's Almanac</h1>
    <div class="subtitle">Island wisdom, books, and Bahamian vibes</div>
  </header>
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Bahamas Beach" class="hero-img">
  <nav>
    <a href="table_of_contents.md">Table of Contents</a>
    <a href="my_philosophy.md">My Philosophy</a>
  </nav>
  <div class="footer">
    &copy; 2025 Kenneth Moncur | Made with island spirit 🌞
  </div>
</body>
</html>
